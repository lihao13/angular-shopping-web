<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>再见</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <h1 class="title">再见</h1>
            <p class="subtitle">感谢这段时间的陪伴</p>
            
            <div class="message">
                <p>故事始于一场遇见</p>
                <p>终于在这一天要说再见</p>
                <p>愿你未来的日子</p>
                <p>阳光满路，温暖如初</p>
                <p>祝你安好，祝你幸福</p>
            </div>

            <div class="date" id="date"></div>
            
            <div class="heart">💔</div>
        </div>
    </div>
    <footer>
        <p class="copyright"></p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
